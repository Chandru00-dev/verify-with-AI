<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Verify with AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>Welcome</h1>

            <!-- Login Form -->
            <div id="loginForm" class="form-container">
                <h2>Login</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="primary-button">Login</button>
                </form>

                <button class="google-button" onclick="handleGoogleLogin()">
                    <span>Login with Google</span>
                </button>

                <p class="switch-form">
                    Don't have an account?
                    <a href="#" onclick="showSignupForm()">Sign Up</a>
                </p>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="form-container" style="display: none;">
                <h2>Create Account</h2>
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signupName">Name</label>
                        <input type="text" id="signupName" required placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" required placeholder="Create a password">
                    </div>
                    <button type="submit" class="primary-button">Sign Up</button>
                </form>

                <p class="switch-form">
                    Already have an account?
                    <a href="#" onclick="showLoginForm()">Login</a>
                </p>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
