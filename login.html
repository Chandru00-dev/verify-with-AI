<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Verify with AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to continue your analysis</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" required placeholder="name@company.com">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="primary-button" style="width: 100%; justify-content: center;">
                        Sign In
                    </button>
                </form>

                <div class="social-login">
                    <button class="social-btn" onclick="handleGoogleLogin()">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                        Continue with Google
                    </button>
                    <button class="social-btn" onclick="handleMicrosoftLogin()">
                        <img src="https://www.svgrepo.com/show/452062/microsoft.svg" alt="Microsoft">
                        Continue with Microsoft
                    </button>
                </div>

                <div class="switch-form">
                    Don't have an account? <a href="#" onclick="showSignupForm()">Create an account</a>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" style="display: none;">
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signupName">Full Name</label>
                        <input type="text" id="signupName" required placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email Address</label>
                        <input type="email" id="signupEmail" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="primary-button" style="width: 100%; justify-content: center;">
                        Create Account
                    </button>
                </form>

                <div class="switch-form">
                    Already have an account? <a href="#" onclick="showLoginForm()">Sign In</a>
                </div>
            </div>

            <div id="message" style="margin-top: 1rem; text-align: center; font-size: 0.9rem; display: none;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
